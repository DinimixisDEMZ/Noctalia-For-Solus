name       : noctalia-qs
version    : 0.0.6
release    : 2
source     :
    - https://github.com/noctalia-dev/noctalia-qs/archive/refs/tags/v0.0.6.tar.gz : d8cc89ed32a723f845e2cd5d452949ccd21f2d9bd047712ed296ed5dd267d3bd
homepage   : https://github.com/noctalia-dev/noctalia-qs
license    : LGPL-3.0-only
component  : desktop.wayland
summary    : Flexible toolkit for making desktop shells with QtQuick (Noctalia fork)
description: |
    noctalia-qs is a custom fork of Quickshell, a flexible toolkit for making desktop
    shells with QtQuick, for Wayland and X11. It serves as the supported runtime
    for the Noctalia shell ecosystem, providing features and patches specific to
    Noctalia, such as ext-background-effect-v1 support.
builddeps  :
    - pkgconfig(gbm)
    - pkgconfig(jemalloc)
    - pkgconfig(libdrm)
    - pkgconfig(libpipewire-0.3)
    - pkgconfig(wayland-protocols)
    - pkgconfig(xcb)
    - pkgconfig(xkbcommon)
    - cli11
    - qt6-base-devel
    - qt6-base-private-devel
    - qt6-declarative-devel
    - qt6-shadertools-devel
    - qt6-wayland-devel
    - vulkan-headers
setup      : |
    %cmake_ninja -DCMAKE_BUILD_TYPE=Release \
                 -DUSE_JEMALLOC=ON \
                 -DDISTRIBUTOR="DinimixisDEMZ" \
                 -DGIT_REVISION="v0.0.6" \
                 -DCRASH_REPORTER=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    ln -sfv quickshell $installdir/usr/bin/qs
